<!DOCTYPE html>
<html>
<head>
    <title>Gainline</title>
    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>

<body>

<header>
    <h1>Gainline</h1>

    <!-- SPORT SELECT -->
    <select id="sportSelect">
        <option value="rugby">Rugby</option>
        <option value="generic">Generic</option>
    </select>
</header>

<input type="file" id="fileInput" accept=".csv">

<!-- SESSIONS -->
<div class="card">
    <div class="card-header">
        <h2>Sessions</h2>
        <button onclick="clearAllSessions()">Clear</button>
    </div>
    <div id="sessionList"></div>
</div>

<!-- STATS -->
<div class="stats-row">
    <div class="stat">
        <span>Top Speed</span>
        <p id="maxSpeed">--</p>
    </div>

    <div class="stat">
        <span>Distance</span>
        <p id="distance">--</p>
    </div>

    <div class="stat">
        <span>Avg Speed</span>
        <p id="avgSpeed">--</p>
    </div>
</div>

<!-- PERFORMANCE -->
<div class="card">
    <h2>Performance</h2>
    <div class="performance">
        <div>
            <span>Impacts</span>
            <p id="impactCount">--</p>
        </div>
        <div>
            <span>Peak Accel</span>
            <p id="peakAccel">--</p>
        </div>
    </div>
</div>

<!-- CHARTS -->
<div class="card">
    <h2>Speed</h2>
    <canvas id="speedChart"></canvas>
</div>

<div class="card">
    <h2>Acceleration</h2>
    <canvas id="accelChart"></canvas>
</div>

<div class="card">
    <h2>Route</h2>
    <div id="map"></div>
</div>

<script src="sports/generic.js"></script>
<script src="sports/rugby.js"></script>
<script src="script.js"></script>

</body>
</html>
