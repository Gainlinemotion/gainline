<!DOCTYPE html>
<html>
<head>
    <title>Gainline</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>

<body>

<header>
    Gainline Dashboard
</header>

<div class="container">

    <!-- Upload -->
    <div class="card">
        <div class="label">Upload Session</div>
        <input type="file" id="fileInput">
    </div>

    <!-- Stats -->
    <div class="card">
        <div class="label">Distance</div>
        <div class="stat" id="distance">--</div>
    </div>

    <div class="card">
        <div class="label">Max Speed</div>
        <div class="stat" id="maxSpeed">--</div>
    </div>

    <!-- Speed Graph -->
    <div class="card">
        <div class="label">Speed Graph</div>
        <canvas id="speedChart"></canvas>
    </div>

    <!-- Acceleration Graph -->
    <div class="card">
        <div class="label">Acceleration (G-Force)</div>
        <canvas id="accelChart"></canvas>
    </div>

    <!-- Map -->
    <div class="card">
        <div class="label">Route Map</div>
        <div id="map" style="height: 300px;"></div>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
